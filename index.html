<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>카페ppp | 500평 규모의 체험형 플레이스</title>
<meta name="description" content="500평 규모의 직영 체험형 공간 카페ppp." />
<link rel="stylesheet" href="./assets/style.css" />

<style>
.heroMain{
  position:relative;
  margin:18px 0;
  border:1px solid var(--line);
  border-radius: calc(var(--radius) + 8px);
  overflow:hidden;
}

/* 이미지 */
.heroMain img{
  width:100%;
  height:auto;
  display:block;
}

/* 이미지 위 어두운 오버레이 */
.heroOverlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.3));
}

/* 이미지 위 텍스트 */
.heroContent{
  position:absolute;
  bottom:30px;
  left:30px;
  right:30px;
  color:#fff;
}

.heroContent h1{
  margin:0 0 8px;
  font-size:34px;
  letter-spacing:-.02em;
}

.heroContent p{
  margin:0;
  font-weight:600;
  opacity:.9;
}

.sectionTitle{
  margin:30px 0 14px;
}

.sectionTitle h2{
  margin:0;
  font-size:22px;
}

.storeGrid{
  display:grid;
  gap:14px;
  grid-template-columns:repeat(3,1fr);
}

.storeCardThumb{
  height:150px;
  background-size:cover;
  background-position:center;
  border-radius:12px;
  border:1px solid var(--line);
}

@media (max-width:900px){
  .heroContent h1{font-size:24px;}
  .storeGrid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="header">
  <div class="container">
    <div class="inner">
      <a class="brand" href="#">
        <span class="logo">P</span>
        <span>카페ppp</span>
      </a>
      <a class="btn primary" href="#stores">직영 매장 보기</a>
    </div>
  </div>
</header>

<main class="container">

<!-- 🔥 메인 배너 -->
<section class="heroMain">
  <img src="./images/cafeppp.png" alt="카페ppp 메인 이미지" />
  <div class="heroOverlay"></div>

  <div class="heroContent">
    <h1>500평 규모의 체험형 플레이스</h1>
    <p>카페ppp</p>
  </div>
</section>


<!-- 🔥 직영 매장 바로 붙임 -->
<div class="sectionTitle" id="stores">
  <h2>직영 매장</h2>
</div>

<section class="storeGrid">

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/catcafe_cover.jpg');"></div>
    <h3>고양이카페</h3>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/parrot.jpg');"></div>
    <h3>앵무새카페</h3>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/rabbit.jpg');"></div>
    <h3>토끼카페</h3>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/dogcafe.jpg');"></div>
    <h3>애견카페</h3>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/kids.jpg');"></div>
    <h3>애니멀 키즈카페</h3>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/hospital.jpg');"></div>
    <h3>동물병원</h3>
  </article>

</section>

<footer class="footer">
  © <span id="year"></span> CafePPP
</footer>

</main>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>

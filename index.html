<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>카페피피피 | 체험형 플레이스</title>
<meta name="description" content="체험형 플레이스, 카페피피피" />
<link rel="stylesheet" href="./assets/style.css" />

<style>
/* ===== 상단 쇼츠 영상 ===== */
.topVideo{
  width:100%;
  margin-bottom:30px;
  display:flex;
  justify-content:center;
}

.videoWrap{
  position:relative;
  width:100%;
  max-width:500px;     /* 너무 넓어지지 않게 */
  aspect-ratio:9 / 16; /* 🔥 쇼츠 세로 비율 */
  overflow:hidden;
  border-radius:20px;
}

.videoWrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
/* ===== 메인 타이틀 ===== */
.heroMain{
  padding:80px 0 20px;
  text-align:center;
}

.heroMain h1{
  margin:0;
  font-size:42px;
  font-weight:900;
  letter-spacing:-0.02em;
}

/* ===== 매장 영역 ===== */
.sectionTitle{
  margin:20px 0 10px;
}

.sectionTitle h2{
  margin:0;
  font-size:22px;
}



.storeGrid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,1fr);
}

.storeCard{
  text-decoration:none;
  color:inherit;
  display:block;
}

.storeCard .card{
  padding:14px;
  cursor:pointer;
}

.storeCardThumb{
  width:100%;
  aspect-ratio:1 / 1;       /* 정사각형 */
  border-radius:12px;
  border:1px solid var(--line);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  margin-bottom:10px;
}

.storeCardThumb img{
  width:100%;
  height:100%;
  object-fit:contain;       /* 절대 안 잘림 */
  display:block;
}

.card h3{
  margin:0;
  font-size:18px;
}

/* ===== 이벤트 영역 ===== */
.eventsWrap{
  margin-top:50px;
}

.eventGrid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,1fr);
}

/* ===== 반응형 ===== */
@media (max-width:900px){
  .heroMain h1{font-size:28px;}
  .storeGrid,
  .eventGrid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header class="header" id="top">
  <div class="container">
    <div class="inner">
      <a class="brand" href="#top">
        <span class="logo">P</span>
        <span>카페피피피</span>
      </a>
      <div style="display:flex; gap:10px;">
        <a class="btn primary" href="#stores">매장</a>
        <a class="btn" href="#events">이벤트</a>
      </div>
    </div>
  </div>
</header>

<main class="container">
<section class="topVideo">
  <div class="videoWrap">
    <iframe
      src="https://www.youtube.com/embed/mt9BRjpQHso?autoplay=1&mute=1&controls=0&loop=1&playlist=mt9BRjpQHso&modestbranding=1&rel=0"
      title="카페피피피 쇼츠"
      frameborder="0"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</section>
<!-- ===== 메인 ===== -->
<section class="heroMain">
  <h1>체험형 플레이스, 카페피피피</h1>
</section>

<!-- ===== 매장 ===== -->

</div>

  <a href="./stores/dog-cafe.html" class="storeCard">

  </a>

      </div>
      <h3>애견미용실</h3>
    </article>
  </a>

  <a href="./stores/hospital.html" class="storeCard">
    <article class="card">
      <div class="storeCardThumb">
        <img src="./images/hospital.jpg" alt="동물병원">
      </div>
      <h3>동물병원</h3>
    </article>
  </a>


  <a href="./stores/shop.html" class="storeCard">
    <article class="card">
      <div class="storeCardThumb">
        <img src="./images/shop.jpg" alt="반려동물 용품매장">
      </div>
      <h3>반려동물 용품매장</h3>

  </a>

    <a href="./stores/rabbit-cafe.html" class="storeCard">

      <div class="storeCardThumb">

      </div>

    </article>

    <a href="./stores/kids-cafe.html" class="storeCard">

</section>
<!-- ===== 이벤트 ===== -->
<div class="eventsWrap" id="events">
  <div class="sectionTitle">
    <h2>이벤트</h2>
  </div>

  <section class="eventGrid">
    <article class="card">
      <h3>3월 이벤트</h3>

    <article class="card">
      <h3>주말 체험 프로그램</h3>

    <article class="card">

    </article>
  </section>
</div>

<footer class="footer">
  © <span id="year"></span> CafePPP
</footer>

</main>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>

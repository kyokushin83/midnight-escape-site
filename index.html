<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>카페ppp | 500평 규모의 체험형 플레이스</title>
<meta name="description" content="500평 규모의 체험형 복합 공간 카페ppp." />
<link rel="stylesheet" href="./assets/style.css" />

<style>

/* ===== 메인 텍스트 ===== */
.heroMain{
  padding:90px 20px 60px;
  text-align:center;
}

.heroMain h1{
  font-size:42px;
  margin:0 0 10px;
  font-weight:900;
  letter-spacing:-.02em;
}

.heroMain .brand{
  font-size:52px;
  font-weight:900;
  background:linear-gradient(90deg,#22c55e,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.heroMain p{
  margin:0;
  font-size:18px;
  color:var(--muted);
  font-weight:600;
}

/* ===== 공통 섹션 타이틀 ===== */
.sectionTitle{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  margin:50px 0 16px;
  flex-wrap:wrap;
}

.sectionTitle h2{
  margin:0;
  font-size:24px;
}

/* ===== 이벤트 ===== */
.eventGrid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,1fr);
}

/* ===== 매장 ===== */
.filterRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.filterBtn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  cursor:pointer;
  font-weight:800;
  font-size:13px;
}

.filterBtn.active{
  background:rgba(34,197,94,.15);
  border-color:rgba(34,197,94,.4);
  color:var(--text);
}

.storeGrid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,1fr);
}

.storeCardThumb{
  height:160px;
  background-size:cover;
  background-position:center;
  border-radius:12px;
  border:1px solid var(--line);
  margin-bottom:10px;
}

.card h3{
  margin:0 0 6px;
  font-size:18px;
}

.card p{
  margin:0;
  color:var(--muted);
  font-size:14px;
}

/* ===== 반응형 ===== */
@media (max-width:900px){
  .heroMain h1{font-size:28px;}
  .heroMain .brand{font-size:36px;}
  .eventGrid,
  .storeGrid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header class="header">
  <div class="container">
    <div class="inner">
      <a class="brand" href="#">
        <span class="logo">P</span>
        <span>카페ppp</span>
      </a>
      <div style="display:flex; gap:10px;">
        <a class="btn" href="#events">이벤트</a>
        <a class="btn primary" href="#stores">매장 보기</a>
      </div>
    </div>
  </div>
</header>

<main class="container">

<!-- ===== 메인 텍스트 ===== -->
<section class="heroMain">
  <h1>500평 규모의 체험형 플레이스</h1>
  <div class="brand">CafePPP</div>
  <p>카페 · 키즈 · 병원 · 미용 · 용품을 한 공간에서</p>
</section>


<!-- ===== 이벤트 섹션 ===== -->
<div class="sectionTitle" id="events">
  <h2>이벤트</h2>
</div>

<section class="eventGrid">
  <article class="card">
    <h3>3월 방문 이벤트</h3>
    <p>기간: 2026.03.01 ~ 03.31</p>
  </article>

  <article class="card">
    <h3>신규 매장 오픈 기념</h3>
    <p>특별 혜택 제공</p>
  </article>

  <article class="card">
    <h3>스탬프 미션 (Coming Soon)</h3>
    <p>곧 공개됩니다</p>
  </article>
</section>


<!-- ===== 매장 ===== -->
<div class="sectionTitle" id="stores">
  <h2>매장</h2>
</div>

<div class="filterRow">
  <button class="filterBtn active">전체</button>
  <button class="filterBtn">동물카페</button>
  <button class="filterBtn">체험·놀이</button>
  <button class="filterBtn">케어·의료</button>
  <button class="filterBtn">리테일</button>
</div>

<section class="storeGrid">

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/catcafe_cover.jpg');"></div>
    <h3>고양이카페</h3>
    <p>동물카페</p>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/parrot.jpg');"></div>
    <h3>앵무새카페</h3>
    <p>동물카페</p>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/rabbit.jpg');"></div>
    <h3>토끼카페</h3>
    <p>동물카페</p>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/dogcafe.jpg');"></div>
    <h3>애견카페</h3>
    <p>동물카페</p>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/kids.jpg');"></div>
    <h3>애니멀 키즈카페</h3>
    <p>체험·놀이</p>
  </article>

  <article class="card">
    <div class="storeCardThumb" style="background-image:url('./images/hospital.jpg');"></div>
    <h3>동물병원</h3>
    <p>케어·의료</p>
  </article>

</section>

<footer class="footer">
  © <span id="year"></span> CafePPP
</footer>

</main>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>고양이카페 | 펫스테이션</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <header class="header">
    <a href="../index.html">← 펫스테이션</a>
  </header>

  <main class="container">
    <section class="hero">
      <h1>고양이카페</h1>
      <p class="muted">동물카페 · 서울/경기(예시) · 동반가능</p>
      <div class="actions">
        <a class="btn primary" href="#">길찾기</a>
        <a class="btn" href="#">예약/문의</a>
      </div>
    </section>

    <section class="card">
      <h2>소개</h2>
      <p>매장 한 줄 소개 + 자세한 설명.</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>기본 정보</h2>
        <ul>
          <li>주소: </li>
          <li>영업시간: </li>
          <li>연락처: </li>
        </ul>
      </div>
      <div class="card">
        <h2>이용 안내</h2>
        <ul>
          <li>이용요금: </li>
          <li>반려동물 정책: </li>
          <li>편의시설: </li>
        </ul>
      </div>
    </section>

    <section class="card">
      <h2>사진</h2>
      <div class="photos">
        <img src="../images/sample1.jpg" alt="">
        <img src="../images/sample2.jpg" alt="">
        <img src="../images/sample3.jpg" alt="">
      </div>
    </section>
  </main>
</body>
</html>

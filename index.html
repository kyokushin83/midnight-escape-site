<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>카페ppp | 500평 규모의 체험형 플레이스</title>
<meta name="description" content="500평 규모의 체험형 플레이스, 카페ppp" />
<link rel="stylesheet" href="./assets/style.css" />

<style>
/* ====== 상단 타이틀(두 줄만) ====== */
.heroMain{
  padding: 70px 0 20px;
  text-align:center;
}
.heroMain h1{
  margin:0;
  font-size:42px;
  font-weight:900;
  letter-spacing:-.02em;
  line-height:1.1;
}

/* ====== 매장: 최대한 위로 붙이기 ====== */
.sectionTitle{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
  margin: 14px 0 10px; /* 🔥 위쪽 여백 최소 */
}
.sectionTitle h2{margin:0; font-size:22px; letter-spacing:-.02em}

.filterRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin: 0 0 12px; /* 🔥 위쪽 여백 최소 */
}
.filterBtn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  cursor:pointer;
  font-weight:800;
  font-size:13px;
}
.filterBtn.active{
  background:rgba(34,197,94,.15);
  border-color:rgba(34,197,94,.4);
  color:var(--text);
}

/* 카드 상단 이미지가 바로 보이게 */
.storeGrid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,1fr);
}
.card{padding:14px}
.storeCardThumb{
  height:180px;                 /* 🔥 이미지 영역 크게 */
  background-size:cover;
  background-position:center;
  border-radius:12px;
  border:1px solid var(--line);
  margin-bottom:10px;
}
.card h3{
  margin:0;
  font-size:18px;
}

/* ====== 이벤트를 아래로 내림 ====== */
.eventsWrap{
  margin-top: 46px; /* 🔥 매장 끝나고 여유 */
}
.eventGrid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,1fr);
}

@media (max-width:900px){
  .heroMain h1{font-size:28px}
  .storeGrid,.eventGrid{grid-template-columns:1fr}
  .storeCardThumb{height:200px} /* 모바일은 더 크게 보여도 좋음 */
}
</style>
</head>

<body>

<header class="header" id="top">
  <div class="container">
    <div class="inner">
      <a class="brand" href="#top">
        <span class="logo">P</span>
        <span>카페ppp</span>
      </a>
      <div style="display:flex; gap:10px;">
        <a class="btn primary" href="#stores">매장</a>
        <a class="btn" href="#events">이벤트</a>
      </div>
    </div>
  </div>
</header>

<main class="container">

  <!-- ✅ 타이틀(요청대로 두 줄만, 같은 크기) -->
  <section class="heroMain">
    <h1>500평 규모의 체험형 플레이스</h1>
    <h1>,카페ppp</h1>
  </section>

  <!-- ✅ 바로 매장 -->
  <div class="sectionTitle" id="stores">
    <h2>매장</h2>
  </div>

  <div class="filterRow" aria-label="카테고리 필터(임시)">
    <button class="filterBtn active" type="button">전체</button>
    <button class="filterBtn" type="button">동물카페</button>
    <button class="filterBtn" type="button">체험·놀이</button>
    <button class="filterBtn" type="button">케어·의료</button>
    <button class="filterBtn" type="button">리테일</button>
  </div>

  <section class="storeGrid">
    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/catcafe_cover.jpg');"></div>
      <h3>고양이카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/parrot.jpg');"></div>
      <h3>앵무새카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/rabbit.jpg');"></div>
      <h3>토끼카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/dogcafe.jpg');"></div>
      <h3>애견카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/coton.jpg');"></div>
      <h3>꼬똥 애견카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/claw.jpg');"></div>
      <h3>인형뽑기카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/rc.jpg');"></div>
      <h3>RC카카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/kids.jpg');"></div>
      <h3>애니멀 키즈카페</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/grooming.jpg');"></div>
      <h3>애견미용실</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/hospital.jpg');"></div>
      <h3>동물병원</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/healing.jpg');"></div>
      <h3>힐링카페(발마사지)</h3>
    </article>

    <article class="card">
      <div class="storeCardThumb" style="background-image:url('./images/shop.jpg');"></div>
      <h3>반려동물 용품매장</h3>
    </article>
  </section>

  <!-- ✅ 이벤트는 아래로 내림 -->
  <div class="eventsWrap" id="events">
    <div class="sectionTitle">
      <h2>이벤트</h2>
    </div>

    <section class="eventGrid">
      <article class="card">
        <h3 style="margin:0 0 6px;">3월 이벤트</h3>
        <p class="muted" style="margin:0;">기간: 2026.03.01 ~ 03.31</p>
      </article>

      <article class="card">
        <h3 style="margin:0 0 6px;">주말 체험 이벤트</h3>
        <p class="muted" style="margin:0;">상시/주말 운영</p>
      </article>

      <article class="card">
        <h3 style="margin:0 0 6px;">스탬프 미션(Coming soon)</h3>
        <p class="muted" style="margin:0;">곧 공개</p>
      </article>
    </section>
  </div>

  <footer class="footer">
    © <span id="year"></span> CafePPP
  </footer>

</main>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
